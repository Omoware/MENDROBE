<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENDROBE — Mendall Fitting Room Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #534AB7;
    --purple-mid: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --bg: #FAF9FF;
    --surface: #FFFFFF;
    --surface2: #F4F3FB;
    --border: rgba(83,74,183,0.15);
    --border2: rgba(83,74,183,0.3);
    --text: #1A1724;
    --text2: #6B6489;
    --text3: #9D99B8;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --amber: #EF9F27;
    --amber-light: #FEF3DC;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(83,74,183,0.08), 0 0 0 0.5px rgba(83,74,183,0.1);
  }
  html { font-size: 16px; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-size: 17px; font-weight: 700; color: var(--purple); letter-spacing: -0.03em; }
  .nav-brand span { color: var(--text3); font-weight: 400; font-size: 13px; margin-left: 4px; }
  .nav-tabs { display: flex; gap: 3px; }
  .nav-tab { padding: 6px 11px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .nav-tab:hover { background: var(--purple-light); color: var(--purple); }
  .nav-tab.active { background: var(--purple); color: white; }

  .hero { background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%); padding: 2.5rem 1.5rem 2rem; text-align: center; }
  .hero-tag { display: inline-block; background: rgba(255,255,255,0.15); color: white; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; margin-bottom: 0.875rem; }
  .hero h1 { font-size: clamp(24px, 5.5vw, 40px); font-weight: 700; color: white; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 0.625rem; }
  .hero p { font-size: 14px; color: rgba(255,255,255,0.72); max-width: 460px; margin: 0 auto 1.75rem; line-height: 1.65; }
  .hero-games { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .hero-game-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); color: white; font-size: 12px; padding: 7px 16px; border-radius: 99px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .hero-game-pill:hover, .hero-game-pill.active { background: white; color: var(--purple); }

  .main { max-width: 720px; margin: 0 auto; padding: 1.75rem 1rem 4rem; }
  .screen { display: none; }
  .screen.active { display: block; }

  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem 1rem; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .stat-value { font-size: 21px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

  .brief-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.125rem; margin-bottom: 1.125rem; display: flex; gap: 1rem; }
  .client-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .brief-meta { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 500; }
  .brief-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; letter-spacing: -0.01em; }
  .brief-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .brief-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 9px; }
  .tag { font-size: 10px; padding: 3px 9px; border-radius: 99px; background: var(--purple-light); color: var(--purple); font-weight: 500; }

  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 9px; }
  .outfit-slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 1.125rem; }
  .outfit-slot { background: var(--surface2); border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 10px 5px; text-align: center; min-height: 76px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.15s; }
  .outfit-slot.filled { border-style: solid; border-color: var(--border); background: var(--surface); }
  .slot-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

  .garment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 7px; margin-bottom: 12px; }
  .garment-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 5px; text-align: center; cursor: pointer; transition: all 0.12s; user-select: none; }
  .garment-item:hover { border-color: var(--purple-mid); background: var(--purple-light); }
  .garment-item.selected { border: 2px solid var(--purple); background: var(--purple-light); }
  .garment-item.wrong { border: 2px solid var(--red); background: var(--red-light); animation: shake 0.3s; }
  .garment-icon { font-size: 22px; margin-bottom: 3px; }
  .garment-name { font-size: 10px; color: var(--text); font-weight: 500; }
  .garment-detail { font-size: 9px; color: var(--text3); margin-top: 1px; }

  .feedback-banner { border-radius: var(--radius); padding: 11px 14px; margin-bottom: 1.125rem; font-size: 13px; line-height: 1.6; display: none; }
  .feedback-banner.success { background: var(--green-light); color: var(--green-dark); display: block; border-left: 3px solid var(--green); }
  .feedback-banner.error { background: var(--red-light); color: #791F1F; display: block; border-left: 3px solid var(--red); }

  .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
  .btn { padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text); transition: all 0.12s; font-family: inherit; }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--purple); color: white; border-color: var(--purple); }
  .btn-primary:hover:not(:disabled) { background: var(--purple-dark); border-color: var(--purple-dark); }

  .timer-bar-wrap { background: var(--surface2); border-radius: 99px; height: 6px; margin-bottom: 1.125rem; overflow: hidden; border: 1px solid var(--border); }
  .timer-bar { height: 100%; border-radius: 99px; background: var(--purple); transition: width 0.5s linear, background 0.3s; }
  .tailor-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.125rem; margin-bottom: 1rem; }
  .task-list { list-style: none; }
  .task-item { display: flex; align-items: center; gap: 9px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-size: 12px; color: transparent; }
  .task-check.done { background: var(--green); border-color: var(--green); color: white; }
  .task-text { font-size: 13px; color: var(--text); flex: 1; line-height: 1.5; }
  .task-text.done { text-decoration: line-through; color: var(--text3); }
  .task-pts { font-size: 11px; color: var(--purple); font-weight: 600; white-space: nowrap; }
  .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 1.125rem; }
  .tool-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 5px; text-align: center; cursor: pointer; transition: all 0.12s; }
  .tool-btn:hover { border-color: var(--purple-mid); background: var(--purple-light); }
  .tool-btn.active-tool { border: 2px solid var(--purple); background: var(--purple-light); }
  .tool-icon { font-size: 20px; color: var(--purple); margin-bottom: 3px; }
  .tool-name { font-size: 10px; color: var(--text); font-weight: 500; }
  .mannequin-area { background: var(--surface2); border-radius: var(--radius-lg); padding: 1.25rem; text-align: center; margin-bottom: 1.125rem; border: 1px solid var(--border); }
  .level-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 11px; border-radius: 99px; background: var(--purple-light); color: var(--purple); font-weight: 600; }
  .xp-bar-wrap { background: var(--surface2); border-radius: 99px; height: 6px; margin: 7px 0 3px; overflow: hidden; border: 1px solid var(--border); }
  .xp-bar { height: 100%; border-radius: 99px; background: var(--purple); transition: width 0.4s ease; }
  .client-header { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; }
  .diff-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .diff-easy { background: var(--green); }
  .diff-medium { background: var(--amber); }
  .diff-hard { background: var(--red); }

  /* FABRIC QUIZ */
  .fabric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.125rem; text-align: center; }
  .fabric-swatch { width: 90px; height: 90px; border-radius: 12px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 42px; border: 1px solid var(--border); }
  .fabric-clue { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 460px; margin: 0 auto; }
  .fabric-hint { font-size: 12px; color: var(--text3); margin-top: 8px; font-style: italic; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1.25rem; }
  .quiz-option { background: var(--surface); border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); transition: all 0.12s; text-align: left; font-family: inherit; }
  .quiz-option:hover:not(:disabled) { border-color: var(--purple-mid); background: var(--purple-light); color: var(--purple); }
  .quiz-option.correct { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .quiz-option.wrong { border-color: var(--red); background: var(--red-light); color: #791F1F; }
  .quiz-option:disabled { cursor: default; }
  .quiz-fact { background: var(--purple-light); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; margin-top: 1rem; font-size: 13px; color: var(--purple-dark); line-height: 1.6; display: none; }
  .quiz-fact.show { display: block; }
  .streak-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--amber-light); color: #8B5E00; font-weight: 600; }

  .result-screen { text-align: center; padding: 2.5rem 1rem; }
  .result-icon { font-size: 54px; margin-bottom: 0.875rem; }
  .result-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 5px; letter-spacing: -0.02em; }
  .result-stars { font-size: 30px; letter-spacing: 5px; margin-bottom: 0.875rem; }
  .result-sub { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 400px; margin: 0 auto 1.5rem; }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 360px; margin: 0 auto 1.5rem; }
  .result-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem; }
  .result-stat-val { font-size: 22px; font-weight: 700; color: var(--purple); }
  .result-stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  .cat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; font-weight: 600; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes pop { 0%{transform:scale(0.9);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop 0.25s ease forwards; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  @media (max-width: 520px) {
    .outfit-slots { grid-template-columns: repeat(2, 1fr); }
    .tool-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 18px; }
    .hero h1 { font-size: 24px; }
    .nav-brand span { display: none; }
    .quiz-options { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">MENDROBE <span>by Mendall</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-style" onclick="switchGame('style')">
      <i class="ti ti-hanger"></i> Style
    </button>
    <button class="nav-tab" id="tab-tailor" onclick="switchGame('tailor')">
      <i class="ti ti-scissors"></i> Tailor
    </button>
    <button class="nav-tab" id="tab-fabric" onclick="switchGame('fabric')">
      <i class="ti ti-flask"></i> Fabric
    </button>
    <button class="nav-tab" id="tab-measure" onclick="switchGame('measure')">
      <i class="ti ti-ruler-measure"></i> Measure
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">Mendall Fitting Room</div>
  <h1>Learn to dress well.<br>By playing.</h1>
  <p>Three games. Real Lagos occasions. Actual tailoring knowledge — taught through play, not lectures.</p>
  <div class="hero-games">
    <div class="hero-game-pill active" id="pill-style" onclick="switchGame('style')">
      <i class="ti ti-hanger"></i> Style the Client
    </div>
    <div class="hero-game-pill" id="pill-tailor" onclick="switchGame('tailor')">
      <i class="ti ti-scissors"></i> Tailor's Table
    </div>
    <div class="hero-game-pill" id="pill-fabric" onclick="switchGame('fabric')">
      <i class="ti ti-flask"></i> Fabric Quiz
    </div>
    <div class="hero-game-pill" id="pill-measure" onclick="switchGame('measure')">
      <i class="ti ti-ruler-measure"></i> Measurement
    </div>
  </div>
</div>

<div class="main">
  <div class="screen active" id="screen-style">
    <div id="style-main"></div>
  </div>
  <div class="screen" id="screen-tailor">
    <div id="tailor-main"></div>
  </div>
  <div class="screen" id="screen-fabric">
    <div id="fabric-main"></div>
  </div>
  <div class="screen" id="screen-measure">
    <div id="measure-main"></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const STYLE_CLIENTS = [
  {
    id:1, name:"Amara O.", event:"Garden Wedding Guest", avatar:"👩🏾", difficulty:"easy",
    desc:"Attending a cousin's outdoor garden wedding in Ikoyi. Elegant but not overdressed. Pastel or floral welcome. Heels may sink — factor in the shoes.",
    tags:["outdoor","formal-adjacent","pastel/floral","daytime"],
    tip:"Garden weddings call for breathable fabrics like chiffon or linen. Avoid heavy velvet or dark dramatic tones. Stilettos sink into grass — a block heel or wedge is the smart move.",
    requiredTypes:["top","bottom_or_dress","shoes","accessory"],
    correct:{ top:["Chiffon blouse","Floral midi dress"], bottom_or_dress:["Floral midi dress","A-line skirt","Palazzo pants"], shoes:["Block-heel sandals","Wedge sandals"], accessory:["Sun hat","Pearl earrings","Clutch bag"] },
    wrong:{ top:["Power blazer","Crop top","Sequin jacket"], bottom_or_dress:["Mini skirt","Leather trousers","Tracksuit bottoms"], shoes:["Stiletto heels","Trainers","Combat boots"], accessory:["Baseball cap","Chunky chain","Backpack"] }
  },
  {
    id:2, name:"Tunde A.", event:"Finance Job Interview", avatar:"👨🏿", difficulty:"easy",
    desc:"First-round interview at a tier-1 investment bank on Victoria Island. Conservative dress code. Fit and grooming do the heavy lifting.",
    tags:["formal","conservative","muted palette","corporate"],
    tip:"In finance interviews, fit beats fabric every time. A well-tailored suit in navy or charcoal signals seriousness. Avoid loud patterns or overly trendy cuts.",
    requiredTypes:["jacket","trousers","shoes","accessory"],
    correct:{ jacket:["Navy suit jacket","Charcoal blazer"], trousers:["Navy suit trousers","Charcoal trousers","Grey dress trousers"], shoes:["Black oxford shoes","Brown derby shoes"], accessory:["Classic tie","Pocket square","Leather belt"] },
    wrong:{ jacket:["Denim jacket","Bomber jacket","Sequin blazer"], trousers:["Cargo trousers","Slim joggers","Ripped jeans"], shoes:["Chunky trainers","White sneakers","Loafers with tassels"], accessory:["Bucket hat","Sports watch","Colourful suspenders"] }
  },
  {
    id:3, name:"Chioma B.", event:"Beach Party — Elegushi", avatar:"👩🏽", difficulty:"medium",
    desc:"Sunset beach party at Elegushi. Fun, flirty, Instagram-ready — but practical for sand and wind. Colour is welcome. Comfort is essential.",
    tags:["casual","vibrant","beach","evening"],
    tip:"Beach occasion dressing balances visual punch with practicality. Breathable fabrics, flat or wedge footwear, and statement accessories do more work than complex layering.",
    requiredTypes:["top","bottom_or_dress","shoes","accessory"],
    correct:{ top:["Crop top","Off-shoulder blouse","Crochet coverup"], bottom_or_dress:["Linen wide-leg trousers","Maxi dress","Wrap skirt"], shoes:["Flat strappy sandals","Espadrilles","Beaded slippers"], accessory:["Oversized sunglasses","Shell jewellery","Beach tote"] },
    wrong:{ top:["Formal blouse","Thick knit jumper","Suit jacket"], bottom_or_dress:["Pencil skirt","Suit trousers","Leather leggings"], shoes:["Court heels","Knee-high boots","Oxford shoes"], accessory:["Briefcase","Formal watch","Wool scarf"] }
  },
  {
    id:4, name:"Emeka N.", event:"Aso-ebi Ceremony", avatar:"👨🏾", difficulty:"medium",
    desc:"A family friend's traditional marriage — he has fabric for an Agbada set. Correct silhouette, underpiece, and shoe combination required for a polished look.",
    tags:["traditional","Yoruba ceremony","agbada","festive"],
    tip:"The Agbada flows best with a well-fitted Sokoto and Buba underneath. Shoe choice — embroidered mules or Babba riga leather — elevates the full ensemble. Avoid western shoes.",
    requiredTypes:["outer","inner","shoes","accessory"],
    correct:{ outer:["Agbada (3-piece)","Senator suit"], inner:["Fitted buba","Plain kaftan top"], shoes:["Leather mules","Embroidered slippers","Babba riga shoes"], accessory:["Fila cap","Coral beads","Embroidered cap"] },
    wrong:{ outer:["Suit jacket","Bomber jacket","Denim jacket"], inner:["T-shirt","Polo shirt","Vest"], shoes:["Running shoes","Chelsea boots","Flip-flops"], accessory:["Baseball cap","Snapback","Western tie"] }
  },
  {
    id:5, name:"Ngozi F.", event:"Corporate Dinner — Eko Hotel", avatar:"👩🏿", difficulty:"medium",
    desc:"Black-tie-adjacent corporate dinner hosted by a multinational on the 18th floor of Eko Hotel. Smart, polished, and memorable — but office-appropriate.",
    tags:["corporate","evening formal","black-tie-adjacent","VI"],

    requiredTypes:["top","bottom_or_dress","shoes","accessory"],
    correct:{ top:["Silk blouse","Structured blazer top"], bottom_or_dress:["Floor-length evening dress","Tailored jumpsuit","Pencil gown"], shoes:["Stiletto heels","Court heels"], accessory:["Statement earrings","Satin clutch","Delicate necklace"] },
    wrong:{ top:["Crop top","Crochet coverup","Thick knit jumper"], bottom_or_dress:["Wrap skirt","Mini skirt","Denim skirt"], shoes:["Beaded slippers","Trainers","Flat strappy sandals"], accessory:["Beach tote","Baseball cap","Backpack"] }
  },
  {
    id:6, name:"Kolade M.", event:"Creative Industry Networking", avatar:"👨🏽", difficulty:"hard",
    desc:"Evening mixer at a creative agency in Yaba. Fashion-adjacent crowd — designers, photographers, brand managers. Looking sharp matters. Looking generic is a fail.",
    tags:["creative","smart-casual","Yaba","statement"],
    tip:"Creative industry events reward intentional dressing. Mixing textures — a linen shirt with tailored trousers and statement sneakers — reads sophisticated and current. Avoid suits that say 'bank job interview'.",
    requiredTypes:["top","trousers","shoes","accessory"],
    correct:{ top:["Linen shirt","Printed shirt","Smart turtleneck"], trousers:["Tailored wide-leg trousers","Cropped chinos","Navy dress trousers"], shoes:["Premium white sneakers","Loafers","Derby shoes"], accessory:["Statement watch","Tote bag","Minimal chain"] },
    wrong:{ top:["Plain T-shirt","Formal suit shirt","Polo shirt"], trousers:["Cargo trousers","Slim joggers","Ripped jeans"], shoes:["Chunky trainers","Flip-flops","Running shoes"], accessory:["Briefcase","Sports watch","Backpack"] }
  },
  {
    id:7, name:"Adaeze K.", event:"Church Service — Smart Casual", avatar:"👩🏾", difficulty:"easy",
    desc:"Sunday service at a Pentecostal church on the Mainland. Smart-casual, modest, and put-together. Colour is fine. The congregation is fashion-aware.",
    tags:["church","modest","smart-casual","Sunday"],
    tip:"Church dressing on the Mainland sits firmly at smart-casual: knee-length or longer, modest neckline, tidy shoes. African print or solid-colour midi dresses work beautifully. Avoid anything revealing.",
    requiredTypes:["top","bottom_or_dress","shoes","accessory"],
    correct:{ top:["Peplum blouse","Lace top","Fitted kaftan"], bottom_or_dress:["Midi skirt","Ankara midi dress","A-line dress"], shoes:["Block-heel sandals","Court heels","Flat pumps"], accessory:["Pearl earrings","Gold bracelet","Small handbag"] },
    wrong:{ top:["Crop top","Off-shoulder blouse","Strapless bandeau"], bottom_or_dress:["Mini skirt","Shorts","Leather leggings"], shoes:["Trainers","Combat boots","Flip-flops"], accessory:["Chunky chain","Baseball cap","Backpack"] }
  },

function switchGame(g) {
  GAMES.forEach(id => {
    document.getElementById("tab-"+id).classList.toggle("active", id===g);
    document.getElementById("screen-"+id).classList.toggle("active", id===g);
    document.getElementById("pill-"+id).classList.toggle("active", id===g);
  });

function renderStyle() {
  const el = document.getElementById("style-main");
  if (SS.phase==="result") { renderStyleResult(el); return; }
  const client = STYLE_CLIENTS[SS.clientIdx % STYLE_CLIENTS.length];
  const slots = client.requiredTypes;
  const slotLabels = {top:"Top",jacket:"Jacket",outer:"Outer",bottom_or_dress:"Bottom/Dress",trousers:"Trousers",inner:"Inner",shoes:"Shoes",accessory:"Accessory"};
  const allGarments = buildGarments(client);
  const filled = slots.filter(s=>SS.selected[s]).length;
  const diffColor = {easy:"var(--green)",medium:"var(--amber)",hard:"var(--red)"}[client.difficulty];

  let html = `<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-value">${SS.score}</div></div>
    <div class="stat-card"><div class="stat-label">Round</div><div class="stat-value">${SS.round} / 8</div></div>
    <div class="stat-card"><div class="stat-label">Filled</div><div class="stat-value">${filled} / ${slots.length}</div></div>
  </div>
  <div class="brief-card">
    <div class="client-avatar">${client.avatar}</div>
    <div style="flex:1;">
      <div class="brief-meta">${client.name} · <span style="color:${diffColor};font-weight:600;">${client.difficulty}</span></div>
      <div class="brief-title">${client.event}</div>
      <div class="brief-desc">${client.desc}</div>
      <div class="brief-tags">${client.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div>
  </div>
  <div class="section-label" style="margin-bottom:7px;">Build the outfit</div>
  <div class="outfit-slots">`;
  slots.forEach(s => {
    const sel = SS.selected[s];
    html += `<div class="outfit-slot ${sel?'filled':''}">
      ${sel?`<div style="font-size:20px;margin-bottom:3px;">${sel.icon}</div><div style="font-size:10px;font-weight:500;color:var(--text);text-align:center;">${sel.name}</div>`:`<div class="slot-label">${slotLabels[s]}</div>`}
    </div>`;
  });
  html += `</div>`;

  if (SS.feedback) {
    html += `<div class="feedback-banner ${SS.feedback.type}">${SS.feedback.msg}</div>`;
  }

  const categories = [...new Set(allGarments.map(g=>g.slot))];
  categories.forEach(cat => {
    const items = allGarments.filter(g=>g.slot===cat);
    html += `<div style="margin-bottom:12px;">
      <div class="cat-label">${slotLabels[cat]||cat}</div>
      <div class="garment-grid">`;
    items.forEach(g => {
      const isSel = SS.selected[cat] && SS.selected[cat].name===g.name;
      html += `<div class="garment-item ${isSel?'selected':''}" onclick="selectGarment('${cat}','${escQ(g.name)}','${g.icon}')">
        <div class="garment-icon">${g.icon}</div>
        <div class="garment-name">${g.name}</div>
        <div class="garment-detail">${g.detail}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="btn-row">
    <button class="btn btn-primary" onclick="submitOutfit()" ${filled<slots.length?'disabled':''}>Submit outfit</button>
    <button class="btn" onclick="clearOutfit()">Clear</button>
  </div>`;

  el.innerHTML = html;
}

function escQ(s) { return s.replace(/'/g,"\\'"); }

function buildGarments(client) {
  const result = [];
  const seen = new Set();
  client.requiredTypes.forEach(slot => {
    const corrList = client.correct[slot]||[];
    const wrnList = client.wrong[slot]||[];
    [...corrList,...wrnList].forEach(name => {
      if (!seen.has(name) && GARMENT_DATA[name]) {
        seen.add(name);
        result.push({name,slot,...GARMENT_DATA[name]});
      }
    });
  });
  return result;
}

function selectGarment(slot, name, icon) {
  SS.selected[slot] = {name,icon};
  SS.feedback = null;
  renderStyle();
}

function clearOutfit() {
  SS.selected = {};
  SS.feedback = null;
  renderStyle();
}

function submitOutfit() {
  const client = STYLE_CLIENTS[SS.clientIdx % STYLE_CLIENTS.length];
  const slots = client.requiredTypes;
  let allCorrect = true;
  let wrongItems = [];
  slots.forEach(s => {
    const sel = SS.selected[s];
    if (!sel) { allCorrect=false; return; }
    if (!(client.correct[s]||[]).includes(sel.name)) { allCorrect=false; wrongItems.push(sel.name); }
  });

  if (allCorrect) {
    SS.score += 100;
    SS.feedback = {type:"success",msg:`✓ Perfect outfit! +100 points — ${client.tip}`};
    setTimeout(() => {
      SS.round++; SS.clientIdx++;
      if (SS.round>8) SS.phase="result";
      SS.selected={}; SS.feedback=null;
      renderStyle();
    }, 2600);
  } else {
    SS.score = Math.max(0, SS.score-20);
    SS.feedback = {type:"error",msg:`✗ Not quite — ${wrongItems.length>0?wrongItems.join(" and ")+" don't suit this occasion.":"Check your choices against the brief."} −20 points.`};
  }
  renderStyle();
}

function renderStyleResult(el) {
  const pct = Math.round((SS.score/800)*100);
  const stars = pct>=88?"⭐⭐⭐":pct>=60?"⭐⭐":"⭐";
  const title = pct>=88?"Impeccable taste!":pct>=60?"Good eye!":"Keep styling!";
  const sub = pct>=88?"Your clients left looking exactly right for every occasion.":pct>=60?"Mostly spot-on — a few choices missed the brief.":"Occasion dressing takes practice. Study the tips and try again.";
  el.innerHTML = `<div class="result-screen pop">
    <div class="result-icon">👗</div>
    <div class="result-title">${title}</div>
    <div class="result-stars">${stars}</div>
    <div class="result-grid">
      <div class="result-stat"><div class="result-stat-val">${SS.score}</div><div class="result-stat-lbl">Score</div></div>
      <div class="result-stat"><div class="result-stat-val">${pct}%</div><div class="result-stat-lbl">Accuracy</div></div>
      <div class="result-stat"><div class="result-stat-val">8</div><div class="result-stat-lbl">Clients</div></div>
    </div>
    <div class="result-sub">${sub}</div>
    <button class="btn btn-primary" onclick="resetStyle()">Play again</button>
  </div>`;
}

function resetStyle() {
  SS = {clientIdx:0,selected:{},score:0,round:1,feedback:null,phase:"play"};
  renderStyle();
}

// ─── TAILOR GAME ──────────────────────────────────────────────────────────────

function renderTailor() {
  const el = document.getElementById("tailor-main");
  if (TS.phase==="result") { renderTailorResult(el); return; }
  if (TS.phase==="intro") { renderTailorIntro(el); return; }
  renderTailorPlay(el);
}

function renderTailorIntro(el) {
  el.innerHTML = `<div style="margin-bottom:1.125rem;">
    <div class="level-badge"><i class="ti ti-sparkles"></i> Level ${TS.level} Tailor</div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${Math.min(100,TS.xp)}%"></div></div>
    <div style="font-size:10px;color:var(--text3);margin-top:2px;">${TS.xp} / 100 XP · Score: ${TS.score}</div>
  </div>
  ${TAILOR_CLIENTS.map((c,i)=>{
    const done=i<TS.clientIdx, active=i===TS.clientIdx, locked=i>TS.clientIdx;
    return `<div class="tailor-card" style="opacity:${locked?0.45:1};">
      <div class="client-header">
        <span style="font-size:28px;">${c.avatar}</span>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px;">
            <span style="font-size:14px;font-weight:600;color:var(--text);">${c.name}</span>
            <span class="diff-dot ${c.diffClass}"></span>
            <span style="font-size:11px;color:var(--text3);">${c.difficulty}</span>
          </div>
          <div style="font-size:12px;color:var(--text2);">${c.garment} · ${c.tasks.length} tasks</div>
        </div>
        ${done?'<i class="ti ti-circle-check-filled" style="font-size:20px;color:var(--green);"></i>':''}
        ${locked?'<i class="ti ti-lock" style="font-size:16px;color:var(--text3);"></i>':''}
      </div>
      ${active?`<button class="btn btn-primary" style="width:100%;" onclick="startTailor()">Start alteration <i class="ti ti-arrow-right"></i></button>`:''}
    </div>`;
  }).join("")}`;
}

function startTailor() {
  TS.phase="play"; TS.checked={};
  TS.timerLeft = TS.clientIdx===0?90:TS.clientIdx===1?70:55;
  TS.timerMax = TS.timerLeft; TS.tool=null;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    TS.timerLeft--;
    if (TS.timerLeft<=0) { clearInterval(timerInterval); TS.timerLeft=0; TS.phase="result"; }
    renderTailor();
  },1000);
  renderTailor();
}

function renderTailorPlay(el) {
  const client = TAILOR_CLIENTS[TS.clientIdx];
  const pct = Math.round((TS.timerLeft/TS.timerMax)*100);
  const barColor = pct>50?"var(--purple)":pct>25?"var(--amber)":"var(--red)";
  const checkedCount = Object.values(TS.checked).filter(Boolean).length;
  const earnedPts = client.tasks.filter(t=>TS.checked[t.id]).reduce((a,t)=>a+t.pts,0);
  const tools = [
    {id:"tape",icon:"ti-ruler",name:"Tape measure"},
    {id:"pins",icon:"ti-needle-thread",name:"Pins"},
    {id:"chalk",icon:"ti-pencil",name:"Chalk marker"},
    {id:"iron",icon:"ti-ironing",name:"Steam iron"}
  ];
  const activeTool = tools.find(t=>t.id===TS.tool);

  el.innerHTML = `<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Time left</div><div class="stat-value" style="color:${pct<=25?'var(--red)':'var(--text)'};">${TS.timerLeft}s</div></div>
    <div class="stat-card"><div class="stat-label">Tasks done</div><div class="stat-value">${checkedCount} / ${client.tasks.length}</div></div>
    <div class="stat-card"><div class="stat-label">Points</div><div class="stat-value">${TS.score+earnedPts}</div></div>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar" style="width:${pct}%;background:${barColor};"></div></div>
  <div class="mannequin-area">
    <div style="font-size:50px;margin-bottom:7px;">${client.avatar}</div>
    <div style="font-size:14px;font-weight:600;color:var(--text);">${client.name}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:2px;">${client.garment}</div>
    ${activeTool?`<div style="margin-top:9px;font-size:12px;color:var(--purple);font-weight:500;"><i class="ti ${activeTool.icon}" style="font-size:13px;"></i> Using: ${activeTool.name}</div>`:`<div style="margin-top:9px;font-size:12px;color:var(--text3);">Select a tool below</div>`}
  </div>
  <div class="section-label">Tools</div>
  <div class="tool-grid">
    ${tools.map(t=>`<div class="tool-btn ${TS.tool===t.id?'active-tool':''}" onclick="selectTool('${t.id}')">
      <div class="tool-icon"><i class="ti ${t.icon}"></i></div>
      <div class="tool-name">${t.name}</div>
    </div>`).join("")}
  </div>
  <div class="section-label">Alteration checklist</div>
  <div class="tailor-card">
    <ul class="task-list">
      ${client.tasks.map(t=>{
        const done=TS.checked[t.id];
        return `<li class="task-item">
          <div class="task-check ${done?'done':''}" onclick="checkTask('${t.id}')">
            ${done?'<i class="ti ti-check" style="font-size:11px;"></i>':''}
          </div>
          <span class="task-text ${done?'done':''}">${t.text}</span>
          <span class="task-pts">+${t.pts}pt</span>
        </li>`;
      }).join("")}
    </ul>
  </div>
  ${checkedCount===client.tasks.length?`<button class="btn btn-primary" style="width:100%;" onclick="completeClient()">Deliver to client <i class="ti ti-arrow-right"></i></button>`:''}`;
}

function selectTool(id) { TS.tool=id; renderTailor(); }
function checkTask(id) { TS.checked[id]=!TS.checked[id]; renderTailor(); }

function completeClient() {
  if (timerInterval) clearInterval(timerInterval);
  const client = TAILOR_CLIENTS[TS.clientIdx];
  const earned = client.tasks.filter(t=>TS.checked[t.id]).reduce((a,t)=>a+t.pts,0);
  const bonus = TS.timerLeft>30?50:TS.timerLeft>10?20:0;
  TS.score += earned+bonus;
  TS.xp += Math.round((earned/client.tasks.reduce((a,t)=>a+t.pts,0))*40);
  if (TS.xp>=100){TS.level++;TS.xp-=100;}
  TS.clientIdx++;
  TS.phase = TS.clientIdx>=TAILOR_CLIENTS.length?"result":"intro";
  renderTailor();
}

function renderTailorResult(el) {
  const maxPts = TAILOR_CLIENTS.reduce((a,c)=>a+c.tasks.reduce((b,t)=>b+t.pts,0),0)+150;
  const pct = Math.round((TS.score/maxPts)*100);
  const stars = pct>=85?"⭐⭐⭐":pct>=55?"⭐⭐":"⭐";
  const title = pct>=85?"Master Tailor!":pct>=55?"Skilled Craftsperson!":"Apprentice";
  const sub = pct>=85?"Flawless alterations, on time, every client satisfied.":pct>=55?"Solid work — some tasks missed or time ran short.":"Keep practising — every stitch teaches you something.";
  el.innerHTML = `<div class="result-screen pop">
    <div class="result-icon">✂️</div>
    <div class="result-title">${title}</div>
    <div class="result-stars">${stars}</div>
    <div class="level-badge" style="margin:0 auto 1rem;display:inline-flex;"><i class="ti ti-sparkles"></i> Level ${TS.level} Tailor</div>
    <div class="result-grid" style="margin-top:1rem;">
      <div class="result-stat"><div class="result-stat-val">${TS.score}</div><div class="result-stat-lbl">Score</div></div>
      <div class="result-stat"><div class="result-stat-val">${pct}%</div><div class="result-stat-lbl">Rating</div></div>
      <div class="result-stat"><div class="result-stat-val">${TS.level}</div><div class="result-stat-lbl">Level</div></div>
    </div>
    <div class="result-sub" style="margin-top:1rem;">${sub}</div>
    <button class="btn btn-primary" onclick="resetTailor()" style="margin-top:1.25rem;">Play again</button>
  </div>`;
}

function resetTailor() {
  if (timerInterval) clearInterval(timerInterval);
  TS={clientIdx:0,checked:{},score:0,xp:0,level:1,timerLeft:90,timerMax:90,phase:"intro",tool:null};
  renderTailor();
}

// ─── FABRIC QUIZ ─────────────────────────────────────────────────────────────

function renderFabric() {
  const el = document.getElementById("fabric-main");
  if (FQ.phase==="result") { renderFabricResult(el); return; }

  const q = FABRIC_QUESTIONS[FQ.qIdx];

  let html = `<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-value">${FQ.score}</div></div>
    <div class="stat-card"><div class="stat-label">Question</div><div class="stat-value">${FQ.qIdx+1} / ${FABRIC_QUESTIONS.length}</div></div>
    <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value">${FQ.streak > 0 ? FQ.streak + ' 🔥' : '—'}</div></div>
  </div>
  <div class="fabric-card">
    <div class="fabric-swatch" style="background:${q.color};">${q.swatch}</div>
    <div class="fabric-clue">${q.clue}</div>
    <div class="fabric-hint">${q.hint}</div>
    <div class="quiz-options">
      ${q.options.map(opt => {
        let cls = '';
        if (FQ.answered) {
          if (opt === q.answer) cls = 'correct';
          else if (opt === FQ.selected) cls = 'wrong';
        }
        return `<button class="quiz-option ${cls}" onclick="answerFabric('${escQ(opt)}')" ${FQ.answered?'disabled':''}>
          ${opt}
        </button>`;
      }).join('')}
    </div>
    <div class="quiz-fact ${FQ.answered?'show':''}">${q.fact}</div>
  </div>
  ${FQ.answered ? `<div class="btn-row"><button class="btn btn-primary" onclick="nextFabric()">${FQ.qIdx+1<FABRIC_QUESTIONS.length?'Next question <i class="ti ti-arrow-right"></i>':'See results <i class="ti ti-trophy"></i>'}</button></div>` : ''}`;

  el.innerHTML = html;
}

function answerFabric(opt) {
  if (FQ.answered) return;
  const q = FABRIC_QUESTIONS[FQ.qIdx];
  FQ.answered = true;
  FQ.selected = opt;
  if (opt === q.answer) {
    const streakBonus = FQ.streak >= 2 ? 10 : 0;
    FQ.score += 100 + streakBonus;
    FQ.streak++;
    FQ.correct++;
    if (FQ.streak > FQ.maxStreak) FQ.maxStreak = FQ.streak;
  } else {
    FQ.streak = 0;
  }
  renderFabric();
}

function nextFabric() {
  FQ.qIdx++;
  FQ.answered = false;
  FQ.selected = null;
  if (FQ.qIdx >= FABRIC_QUESTIONS.length) {
    FQ.phase = "result";
  }
  renderFabric();
}

function renderFabricResult(el) {
  const total = FABRIC_QUESTIONS.length;
  const pct = Math.round((FQ.correct/total)*100);
  const stars = pct>=90?"⭐⭐⭐":pct>=60?"⭐⭐":"⭐";
  const title = pct>=90?"Textile Expert!":pct>=60?"Fabric-Savvy!":"Keep Learning!";
  const sub = pct>=90?"You could advise any Mendall client on material choices.":pct>=60?"Good fabric awareness — a few materials to study further.":"Spend time at Balogun market — the fabrics will teach you.";
  el.innerHTML = `<div class="result-screen pop">
    <div class="result-icon">🧵</div>
    <div class="result-title">${title}</div>
    <div class="result-stars">${stars}</div>
    <div class="result-grid">
      <div class="result-stat"><div class="result-stat-val">${FQ.correct}/${total}</div><div class="result-stat-lbl">Correct</div></div>
      <div class="result-stat"><div class="result-stat-val">${FQ.score}</div><div class="result-stat-lbl">Score</div></div>
      <div class="result-stat"><div class="result-stat-val">${FQ.maxStreak}🔥</div><div class="result-stat-lbl">Best streak</div></div>
    </div>
    <div class="result-sub" style="margin-top:0.75rem;">${sub}</div>
    <button class="btn btn-primary" onclick="resetFabric()" style="margin-top:1.25rem;">Play again</button>
  </div>`;
}

function resetFabric() {
  FQ = {qIdx:0,score:0,streak:0,maxStreak:0,answered:false,selected:null,correct:0,phase:"play"};
  renderFabric();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderStyle();
</script>
<script src="measurement-game.js"></script>
</body>
</html>
